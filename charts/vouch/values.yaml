# Default values for vouch.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/deep-rent/vouch
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

pdb:
  enabled: false
  minAvailable: 1

networkPolicy:
  enabled: false

# Vouch specific configuration
vouch:
  # See https://github.com/deep-rent/vouch for configuration options
  config:
    logLevel: info
    logFormat: json
    host: 0.0.0.0
    port: 8080
    target: "http://{{ .Release.Name }}-couchdb.{{ .Release.Namespace }}.svc.cluster.local:5984"
    tokenRolesClaim: "_couchdb.roles"
    keys:
      # REQUIRED: Set this to your JWKS URL during installation.
      timeout: 10s
      minRefreshInterval: 1m
      maxRefreshInterval: 10080m
    # Example for token validation:
    # token:
    #   issuers:
    #     - "https://accounts.google.com"
    #   audiences:
    #     - "my-client-id"

# CouchDB dependency configuration
couchdb:
  enabled: true
  # If you disable the couchdb dependency, make sure to update vouch.config.target
  # to point to your external CouchDB instance.

  # We use a ConfigMap to configure CouchDB to use Vouch for proxy authentication.
  # The couchdb chart will mount this as /opt/couchdb/etc/local.d/10-vouch.ini
  extraIni:
    10-vouch.ini: |
      [httpd]
      authentication_handlers = {chttpd_auth, proxy_authentication_handler}, {chttpd_auth, default_authentication_handler}

  # The official couchdb chart requires persistent volumes.
  # For a quick start, you can disable them, but this is not recommended for production.
  persistentVolume:
    enabled: false

  # For security reasons, it's recommended to set a password. If not set, a
  # random password will be generated.
  adminUsername: admin
  adminPassword: ""
  createAdminSecret: true

  # We need a service for CouchDB so that Vouch can connect to it.
  service:
    enabled: true

  # The CouchDB container is exposed via the Vouch service.
  # We don't need an ingress for CouchDB itself.
  ingress:
    enabled: false
